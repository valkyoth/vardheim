name: Bug report
description: Report a reproducible Vardheim bug.
title: "[bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Steps, input, or test case.
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security impact
      description: Do not include exploitable private details. Use SECURITY.md for private reports.
    validations:
      required: false
